version: '3.9'

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: humanai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: humanai_redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    container_name: humanai_minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - '9000:9000'
      - '9001:9001'

  nginx:
    image: nginx:alpine
    container_name: humanai_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '80:8080'
    depends_on:
      postgres: { condition: service_healthy }

  prometheus:
    image: prom/prometheus:latest
    container_name: humanai_prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '9090:9090'

  grafana:
    image: grafana/grafana:latest
    container_name: humanai_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning:ro
    ports:
      - '3001:3000'

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: humanai_n8n
    restart: unless-stopped
    ports:
      - '5678:5678'
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      # WEBHOOK_URL must be the public-facing URL so n8n registers correct webhook paths
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_RUNNERS_ENABLED=true
      - GENERIC_TIMEZONE=Europe/Paris
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-changeme32charskey1234567890abc}
      # Enable the public REST API so the import script can use it
      - N8N_PUBLIC_API_DISABLED=false
      # OpenRouter key — exposed as env var inside n8n expressions via $env.OPENROUTER_API_KEY
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-google/gemini-2.5-flash}
      # Internal token for n8n→backend RAG calls
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-changeme-internal-token-32chars!!}
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      # Basic auth to protect n8n UI in production
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-false}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme}
    volumes:
      - n8n_data:/home/node/.n8n
      # Workflows mounted read-only for reference; import is done via n8n-import service
      - ./n8n/workflows:/opt/humanai-workflows:ro
    depends_on:
      - redis
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5678/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # One-shot container: imports n8n workflows via the REST API after n8n is healthy
  n8n-import:
    image: curlimages/curl:latest
    container_name: humanai_n8n_import
    restart: "no"
    depends_on:
      n8n:
        condition: service_healthy
    volumes:
      - ./n8n/workflows:/workflows:ro
      - ./n8n/import-workflows.sh:/import-workflows.sh:ro
    entrypoint: ["/bin/sh", "/import-workflows.sh"]
    environment:
      - N8N_URL=http://humanai_n8n:5678
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-false}

volumes:
  postgres_data:
  redis_data:
  minio_data:
  grafana_data:
  n8n_data:

networks:
  default:
    name: humanai_network
