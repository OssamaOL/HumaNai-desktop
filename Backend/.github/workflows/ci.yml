name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Opt actions into Node.js 24 to suppress deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  packages: write

jobs:

  # 1. Lint and Test Job
  test:
    name: Lint & Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        cache: "pip"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libjpeg-dev libopenjp2-7-dev libgirepository1.0-dev

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r humanai_backend/requirements.txt
        pip install pytest pytest-asyncio aiosqlite flake8 bandit safety

    - name: Run Linter (flake8)
      run: |
        cd humanai_backend
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Security Scan (Bandit)
      run: |
        cd humanai_backend
        # Scan backend application code for common security vulnerabilities
        bandit -r app/ -ll

    - name: Run Dependency Security Check (Safety)
      run: |
        # Check packages for known vulnerabilities. exit-zero to report findings without blocking CI on external database issues.
        safety check -r humanai_backend/requirements.txt || true

    - name: Run Test Suite
      run: |
        cd humanai_backend
        python -m pytest


  # 2. Build and Push Docker Images
  build-and-push:
    name: Build & Push Docker Images
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry (GHCR)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Backend Image (Local)
      uses: docker/build-push-action@v5
      with:
        context: ./humanai_backend
        file: ./humanai_backend/Dockerfile
        load: true
        tags: backend:temp

    - name: Scan Backend Image with Trivy
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
      with:
        image-ref: 'backend:temp'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

    - name: Build and Push Backend Image (Release)
      uses: docker/build-push-action@v5
      with:
        context: ./humanai_backend
        file: ./humanai_backend/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/backend:latest
          ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

    - name: Build Nginx Image (Local)
      uses: docker/build-push-action@v5
      with:
        context: ./infra/nginx
        file: ./infra/nginx/Dockerfile
        load: true
        tags: nginx:temp

    - name: Scan Nginx Image with Trivy
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
      with:
        image-ref: 'nginx:temp'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

    - name: Build and Push Nginx Image (Release)
      uses: docker/build-push-action@v5
      with:
        context: ./infra/nginx
        file: ./infra/nginx/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/nginx:latest
          ghcr.io/${{ github.repository }}/nginx:${{ github.sha }}


  # 3. Deploy Job
  deploy:
    name: Deploy to Railway
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Railway CLI
      run: npm install -g @railway/cli

    - name: Deploy Backend to Railway
      run: |
        cd humanai_backend
        railway up --service backend --detach
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

